# Render Blueprint for MediCast
# Deploy automatically by linking your GitHub repository to Render and selecting "Blueprint".

services:
  # 1. PostgreSQL Database
  - type: psqldb
    name: medicast-db
    plan: free 
    postgresMajorVersion: 15

  # 2. Python Backend (FastAPI via Docker)
  - type: web
    name: medicast-backend
    env: docker
    dockerfilePath: ./backend.Dockerfile
    plan: free
    healthCheckPath: /
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: medicast-db
          property: connectionString
      - key: FIREWORKS_API_KEY
        sync: false # You will be prompted to enter this in the Render Dashboard

  # 3. React Frontend (Static Site)
  - type: web
    name: medicast-frontend
    env: static
    plan: free
    buildCommand: npm install && npm run build
    staticPublishPath: ./dist
    envVars:
      - key: VITE_RENDER_BACKEND_HOST
        fromService:
          type: web
          name: medicast-backend
          property: host
