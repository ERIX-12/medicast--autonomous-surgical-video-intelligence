# =============================================================================
# MediCast — Nginx Configuration
#
# Serves the Vite production build and reverse-proxies API/WS to the
# Python inference server running on port 8000.
# =============================================================================

upstream inference_server {
    # The inference-server container is reachable by its service name
    server inference-server:8000;
}

server {
    listen 80;
    listen [::]:80;
    server_name _;

    # ── SSL/TLS (add Let's Encrypt certs here in production) ─────────────────
    # listen 443 ssl http2;
    # listen [::]:443 ssl http2;
    # ssl_certificate     /etc/letsencrypt/live/medicast.example.com/fullchain.pem;
    # ssl_certificate_key /etc/letsencrypt/live/medicast.example.com/privkey.pem;
    # ssl_protocols       TLSv1.2 TLSv1.3;
    # ssl_ciphers         HIGH:!aNULL:!MD5;

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # ── Static Assets (Vite production build) ──────────────────────────────
    root /usr/share/nginx/html;
    index index.html;

    # Brotli / gzip compression
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types text/plain text/css text/xml application/json application/javascript image/svg+xml;

    # Cache busting: Vite outputs hashed filenames in assets/
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # SPA fallback — all non-file, non-API routes serve index.html
    location / {
        try_files $uri $uri/ /index.html;
    }

    # ── API Reverse Proxy (to Python inference server) ─────────────────────
    location /api/ {
        proxy_pass http://inference_server/;

        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Timeouts
        proxy_connect_timeout 10s;
        proxy_send_timeout    120s;
        proxy_read_timeout    120s;

        # Large request body (for base64-encoded frames)
        client_max_body_size 50M;
    }

    # ── WebSocket Proxy ─────────────────────────────────────────────────────
    location /api/ws {
        proxy_pass http://inference_server/ws;

        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;

        # WebSocket-specific timeouts (long-lived connections)
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;

        # Large frames
        client_max_body_size 50M;
    }

    # ── MinIO Proxy (optional; uncomment if MinIO is co-located) ────────────
    # location /minio/ {
    #     proxy_pass http://minio:9000/;
    #     proxy_http_version 1.1;
    #     proxy_set_header Host $host;
    #     proxy_set_header X-Real-IP $remote_addr;
    #     # MinIO requires these headers for S3 signature verification
    #     proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    #     proxy_set_header X-Forwarded-Proto $scheme;
    #     client_max_body_size 500M;
    # }

    # ── Health Check ────────────────────────────────────────────────────────
    location /health {
        access_log off;
        return 200 "OK\n";
        add_header Content-Type text/plain;
    }
}

